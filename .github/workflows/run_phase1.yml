name: P1_Scout
on: [workflow_dispatch]
jobs:
  run-p1:
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install yfinance pandas numpy matplotlib google-generativeai
      - env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python smc_radar.py
      - name: Commit state files
        run: |
          set -e
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          FILES="active_obs.json emailed_zones.json smc_radar.log yfinance_stale_log.json"

          mkdir -p /tmp/p1_writes
          for f in $FILES; do
            if [ -f "$f" ]; then cp "$f" "/tmp/p1_writes/$f"; fi
          done

          git fetch origin main
          git reset --hard origin/main
          for f in $FILES; do
            if [ -f "/tmp/p1_writes/$f" ]; then cp "/tmp/p1_writes/$f" "$f"; fi
          done

          git add $FILES || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "P1 Update [skip ci]"

          for i in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "Push succeeded on attempt $i."
              exit 0
            fi
            echo "Push rejected. Rebasing and retrying (attempt $i)."
            git fetch origin main
            git reset --hard origin/main
            for f in $FILES; do
              if [ -f "/tmp/p1_writes/$f" ]; then cp "/tmp/p1_writes/$f" "$f"; fi
            done
            git add $FILES || true
            if git diff --staged --quiet; then
              echo "Nothing to commit after rebase."
              exit 0
            fi
            git commit -m "P1 Update [skip ci]"
            sleep 2
          done

          echo "Push failed after 5 attempts."
          exit 1
