name: P1_Scout
on: [workflow_dispatch]
jobs:
  run-p1:
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install yfinance pandas numpy matplotlib google-generativeai
      - env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python smc_radar.py

      - name: Commit state files
        run: |
          set -e
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # P1 owns these files. yfinance_stale_log is shared with P2/P3 (append-only log).
          ALL_FILES="active_obs.json emailed_zones.json email_gate.json yfinance_stale_log.json"

          FILES=""
          for f in $ALL_FILES; do
            if [ -f "$f" ]; then FILES="$FILES $f"; fi
          done
          echo "Files to commit: $FILES"

          if [ -z "$FILES" ]; then
            echo "Nothing to commit."
            exit 0
          fi

          git add $FILES
          if git diff --staged --quiet; then
            echo "No changes."
            exit 0
          fi

          # Stash my writes, sync to latest origin, reapply my writes on top.
          # This avoids overwriting writes from a concurrent P2 or P3 run.
          for i in 1 2 3 4 5; do
            git stash push -- $FILES || true
            git fetch origin main
            git reset --hard origin/main
            git stash pop || true

            git add $FILES 2>/dev/null || true
            if git diff --staged --quiet; then
              echo "Nothing to commit after sync."
              exit 0
            fi

            git commit -m "P1 Update [skip ci]"
            if git push origin HEAD:main; then
              echo "Push succeeded on attempt $i."
              exit 0
            fi
            echo "Push rejected. Retrying (attempt $i)."
            sleep 2
          done

          echo "Push failed after 5 attempts."
          exit 1
