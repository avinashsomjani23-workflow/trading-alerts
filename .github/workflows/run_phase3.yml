name: P3_Trigger
on: [workflow_dispatch]
jobs:
  run-p3:
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if watch state has work to do
        id: gate
        run: |
          set -e
          if [ ! -f active_watch_state.json ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "active_watch_state.json missing. Skipping."
            exit 0
          fi
          # Count non-meta keys using python3 (pre-installed on ubuntu-latest)
          COUNT=$(python3 -c "
          import json, sys
          try:
              with open('active_watch_state.json') as f:
                  d = json.load(f)
              if not isinstance(d, dict):
                  print('bad'); sys.exit(0)
              print(len([k for k in d.keys() if not k.startswith('__')]))
          except Exception:
              print('bad')
          ")
          if [ "$COUNT" = "bad" ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Watch state unreadable. Falling through to full Python run for diagnosis."
          elif [ "$COUNT" = "0" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Watch state empty. Skipping Python env setup and run."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Watch state has $COUNT entries. Proceeding with full run."
          fi

      - uses: actions/setup-python@v5
        if: steps.gate.outputs.skip != 'true'
        with: { python-version: '3.11' }

      - name: Install deps
        if: steps.gate.outputs.skip != 'true'
        run: pip install yfinance pandas numpy matplotlib requests

      - name: Run Phase 3
        if: steps.gate.outputs.skip != 'true'
        env:
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          GMAIL_ADDRESS:      ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python phase3_engine.py

      - name: Commit state files
        if: steps.gate.outputs.skip != 'true'
        run: |
          set -e
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          ALL_FILES="alert_log.json scan_log.json system_status.json zone_visit_state.json active_watch_state.json phase2_sent.json yfinance_stale_log.json gemini_failure_log.json chart_failure_log.json"

          FILES=""
          for f in $ALL_FILES; do
            if [ -f "$f" ]; then FILES="$FILES $f"; fi
          done
          echo "Files to commit: $FILES"

          mkdir -p /tmp/p3_writes
          for f in $FILES; do
            cp "$f" "/tmp/p3_writes/$f"
          done

          git fetch origin main
          git reset --hard origin/main
          for f in $FILES; do
            cp "/tmp/p3_writes/$f" "$f"
          done

          git add $FILES
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "P3 Update [skip ci]"

          for i in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "Push succeeded on attempt $i."
              exit 0
            fi
            echo "Push rejected. Rebasing and retrying (attempt $i)."
            git fetch origin main
            git reset --hard origin/main
            for f in $FILES; do
              if [ -f "/tmp/p3_writes/$f" ]; then cp "/tmp/p3_writes/$f" "$f"; fi
            done
            git add $FILES || true
            if git diff --staged --quiet; then
              echo "Nothing to commit after rebase."
              exit 0
            fi
            git commit -m "P3 Update [skip ci]"
            sleep 2
          done

          echo "Push failed after 5 attempts."
          exit 1
