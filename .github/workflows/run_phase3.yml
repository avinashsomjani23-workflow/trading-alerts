name: P3_Trigger
on: [workflow_dispatch]
jobs:
  run-p3:
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install yfinance pandas numpy matplotlib requests
      - env:
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          GMAIL_ADDRESS:      ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python phase3_engine.py
      - run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git stash push -m "local writes" || true
          git pull --rebase origin main || true
          git stash pop || true
          git add active_watch_state.json yfinance_stale_log.json chart_failure_log.json || true
          git diff --staged --quiet || git commit -m "P3 Update [skip ci]"
          git push origin HEAD:main || true
