name: Trading Alert Engine

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"   # silences Node.js deprecation warning

jobs:
  run-alerts:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance requests numpy matplotlib pandas

      - name: Run alert engine
        env:
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          GMAIL_ADDRESS:      ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL:        ${{ secrets.ALERT_EMAIL }}
          NEWS_API_KEY:       ${{ secrets.NEWS_API_KEY }}
        run: python alert_engine.py

      - name: Save logs to repo
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add alert_log.json zone_visit_state.json || true
          git diff --staged --quiet || git commit -m "Update logs [skip ci]"
          git push || true
