name: P2_Radar
on: [workflow_dispatch]
jobs:
  run-p2:
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -r requirements.txt
      - env:
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          GMAIL_ADDRESS:      ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL:        ${{ secrets.ALERT_EMAIL }}
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
        run: python Phase2_Alert_Engine.py

      - name: Commit state files
        run: |
          set -e
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # P2 owns: phase2_sent, heartbeat_state, gemini_failure_log, p1_stale_alert_state.
          # Shared (multi-writer): active_watch_state (with P3), yfinance_stale_log (P1/P3), chart_failure_log (P3).
          # Paths MUST match where the engine actually writes: everything routes
          # through paths.resolve_repo_path -> state/ EXCEPT the two ROOT_KEEP
          # files (phase2_scan_log.jsonl stays at root). A bare name here that the
          # engine writes to state/ silently commits nothing, so the dedup memory
          # never persists and every scan re-emails (fixed 2026-07-23).
          ALL_FILES="state/phase2_sent.json state/active_watch_state.json state/heartbeat_state.json state/heartbeat_log.json state/yfinance_stale_log.json state/gemini_failure_log.json state/chart_failure_log.json phase2_scan_log.jsonl state/p1_stale_alert_state.json state/gemini_cache.json"
          FILES=""
          for f in $ALL_FILES; do
            if [ -f "$f" ]; then FILES="$FILES $f"; fi
          done
          # FF calendar cache (directory of weekly XML). Persisted so the next
          # run has a last-good copy when ForexFactory rate-limits or drops a
          # week file — otherwise the fresh checkout starts with an empty cache.
          if [ -d "state/ff_calendar_cache" ]; then
            FILES="$FILES state/ff_calendar_cache"
          fi
          echo "Files to commit: $FILES"

          if [ -z "$FILES" ]; then
            echo "Nothing to commit."
            exit 0
          fi

          git add $FILES
          if git diff --staged --quiet; then
            echo "No changes."
            exit 0
          fi

          for i in 1 2 3 4 5; do
            git stash push -- $FILES || true
            git fetch origin main
            git reset --hard origin/main
            git stash pop || true

            git add $FILES 2>/dev/null || true
            if git diff --staged --quiet; then
              echo "Nothing to commit after sync."
              exit 0
            fi

            git commit -m "P2 Update [skip ci]"
            if git push origin HEAD:main; then
              echo "Push succeeded on attempt $i."
              exit 0
            fi
            echo "Push rejected. Retrying (attempt $i)."
            sleep 2
          done

          echo "Push failed after 5 attempts."
          exit 1
