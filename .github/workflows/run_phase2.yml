name: P2_Radar
on: [workflow_dispatch]
jobs:
  run-p2:
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install yfinance requests numpy matplotlib pandas
      - env:
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          GMAIL_ADDRESS:      ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL:        ${{ secrets.ALERT_EMAIL }}
        run: python alert_engine.py
      - run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git pull --rebase origin main || true
          git add alert_log.json scan_log.json system_status.json zone_visit_state.json active_watch_state.json || true
          git diff --staged --quiet || git commit -m "P2 Update [skip ci]"
          git push origin HEAD:main || true
