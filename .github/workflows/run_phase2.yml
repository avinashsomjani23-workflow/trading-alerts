name: P2_Radar
on: [workflow_dispatch]
jobs:
  run-p2:
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install yfinance requests numpy matplotlib pandas
      - env:
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          GMAIL_ADDRESS:      ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL:        ${{ secrets.ALERT_EMAIL }}
        run: python Phase2_Alert_Engine.py

      - name: Commit state files
        run: |
          set -e
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # P2 owns: phase2_sent, heartbeat_state, gemini_failure_log.
          # Shared (multi-writer): active_watch_state (with P3), yfinance_stale_log (P1/P3), chart_failure_log (P3).
          ALL_FILES="phase2_sent.json active_watch_state.json heartbeat_state.json heartbeat_log.json yfinance_stale_log.json gemini_failure_log.json chart_failure_log.json phase2_scan_log.jsonl"
          FILES=""
          for f in $ALL_FILES; do
            if [ -f "$f" ]; then FILES="$FILES $f"; fi
          done
          echo "Files to commit: $FILES"

          if [ -z "$FILES" ]; then
            echo "Nothing to commit."
            exit 0
          fi

          git add $FILES
          if git diff --staged --quiet; then
            echo "No changes."
            exit 0
          fi

          for i in 1 2 3 4 5; do
            git stash push -- $FILES || true
            git fetch origin main
            git reset --hard origin/main
            git stash pop || true

            git add $FILES 2>/dev/null || true
            if git diff --staged --quiet; then
              echo "Nothing to commit after sync."
              exit 0
            fi

            git commit -m "P2 Update [skip ci]"
            if git push origin HEAD:main; then
              echo "Push succeeded on attempt $i."
              exit 0
            fi
            echo "Push rejected. Retrying (attempt $i)."
            sleep 2
          done

          echo "Push failed after 5 attempts."
          exit 1
