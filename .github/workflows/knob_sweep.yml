name: Knob Sweep

# Tune the knobs — SEPARATE from the Backtest workflow. You pick a knob (up to
# two), a month, and a year. No dates: the runner converts month+year to REAL
# calendar bounds (July=31, leap-Feb=29). Each knob runs as its OWN parallel
# job, writes its OWN immutable run directory, and sends its OWN email. The grid
# per knob is FROZEN in run_knob_sweep.KNOB_GRID so two years of monthly runs
# pool cleanly in the aggregator.

on:
  workflow_dispatch:
    inputs:
      knob_1:
        description: "Knob to tune"
        required: true
        type: choice
        options:
          - MIN_LEG_ATR_MULT
          - BOS_ATR_MULT
          - STRUCTURE_CHOCH_ATR_MULT
          - STRUCTURE_LOCK_ATR_MULT
          - OB_MAX_RANGE_ATR_MULT
          - MIN_OB_RANGE_ATR_MULT
          - FVG_NOISE_FLOOR_MULT
          - SWEEP_EQUAL_LEVEL_TOLERANCE_ATR
          - SWEEP_WICK_PIERCE_MIN_ATR
      knob_2:
        description: "Second knob (optional — runs in parallel, separate email)"
        required: false
        default: "none"
        type: choice
        options:
          - none
          - MIN_LEG_ATR_MULT
          - BOS_ATR_MULT
          - STRUCTURE_CHOCH_ATR_MULT
          - STRUCTURE_LOCK_ATR_MULT
          - OB_MAX_RANGE_ATR_MULT
          - MIN_OB_RANGE_ATR_MULT
          - FVG_NOISE_FLOOR_MULT
          - SWEEP_EQUAL_LEVEL_TOLERANCE_ATR
          - SWEEP_WICK_PIERCE_MIN_ATR
      periods:
        description: "Months — comma list of YYYY-MM across any years (e.g. 2024-07,2025-01,2026-03)"
        required: true
        default: "2024-07"
      pairs:
        description: "Comma-separated pairs"
        required: false
        default: "EURUSD,USDJPY,NZDUSD,USDCHF,NAS100,GOLD"
      risk_usd:
        description: "Risk per trade in USD (1R)"
        required: false
        default: "250"
      send_email:
        description: "Email ONE roll-up across all months (per-month emails are off)"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

jobs:
  # Build the matrix of selected knobs (1 or 2). De-dupes if the same knob is
  # picked twice; drops the "none" sentinel.
  prepare:
    runs-on: ubuntu-latest
    outputs:
      knobs: ${{ steps.build.outputs.knobs }}
      periods: ${{ steps.build.outputs.periods }}
    steps:
      - id: build
        env:
          PERIODS_RAW: ${{ inputs.periods }}
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json, os, re
          picks = ["${{ inputs.knob_1 }}", "${{ inputs.knob_2 }}"]
          seen, knobs = set(), []
          for k in picks:
              if k and k != "none" and k not in seen:
                  seen.add(k); knobs.append(k)
          print("knobs=" + json.dumps(knobs))

          # Parse the free-text months. Validate strictly so a typo fails the run
          # loudly here, not silently inside the matrix. One month = one run.
          seen_p, periods = set(), []
          for tok in os.environ["PERIODS_RAW"].split(","):
              tok = tok.strip()
              if not tok:
                  continue
              if not re.fullmatch(r"\d{4}-\d{2}", tok):
                  raise SystemExit(f"bad period {tok!r}; want YYYY-MM (e.g. 2024-07)")
              y, m = tok.split("-")
              if not (1 <= int(m) <= 12):
                  raise SystemExit(f"bad month in {tok!r}; month must be 01..12")
              if tok not in seen_p:
                  seen_p.add(tok); periods.append(tok)
          if not periods:
              raise SystemExit("no valid periods parsed from input")
          print("periods=" + json.dumps(periods))
          PY

  sweep:
    needs: prepare
    runs-on: ubuntu-latest
    # GitHub's hard ceiling is 360 min/job; 350 leaves margin for the runner's
    # own cleanup so a long cell is never SIGKILLed mid-commit and lost.
    timeout-minutes: 350
    permissions:
      contents: write   # commit the immutable run dir back to main
    strategy:
      fail-fast: false   # one (knob, month) failing must not cancel the others
      matrix:
        # Cross product: every selected knob is tested on every selected month.
        # Each (knob, month) cell is its OWN run dir + email + corpus row.
        knob: ${{ fromJson(needs.prepare.outputs.knobs) }}
        period: ${{ fromJson(needs.prepare.outputs.periods) }}
    concurrency:
      # One commit at a time per (knob, month) cell. Different cells still race
      # the push to main — the rebase+retry loop below resolves that.
      group: knob-sweep-commit-${{ matrix.knob }}-${{ matrix.period }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main          # must be on main so push origin HEAD:main works
          fetch-depth: 0

      - name: Pre-flight remote check
        # Read-only reachability probe. Fails fast (before the 2-hour sweep)
        # ONLY on a genuinely broken token/network — NEVER on a concurrent
        # push.
        #
        # The old version pushed an empty "canary" commit with a bare
        # `git push` (no rebase, no retry). Any push that landed on main in
        # between — a sibling matrix cell's canary, or a P1/P2 state commit —
        # rejected it as a non-fast-forward ("fetch first") and turned the job
        # red with a MISLEADING "branch protection / token perms" error. It
        # also left the canary on main permanently (`git reset HEAD~1` only
        # undoes it locally), polluting history.
        #
        # ls-remote moves nothing and cannot non-fast-forward-fail. The single
        # authoritative push to main is the "Commit run directory" step below:
        # it rebases, retries 5×, and goes loud-red with a 30-day artifact
        # fallback if it ever truly cannot push.
        run: |
          if ! git ls-remote --exit-code origin main >/dev/null 2>&1; then
            echo "::error::Cannot reach origin/main with this token — fix token/network before running a sweep."
            exit 1
          fi
          echo "origin/main reachable; run-dir commit step handles the push (rebase + retry)."

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Knob-site golden gate (use-live-never-copy guard)
        # Fails red if a live function gained a MIN_LEG default the sweep does
        # not override — the blind spot that would silently corrupt the corpus.
        run: python -m backtest.diagnostics.test_knob_sites_golden

      - name: Driver self-check (override round-trip + def-time-trap)
        run: python -c "from backtest.diagnostics import driver; driver.self_check()"

      - name: Run knob sweep
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          BACKTEST_EMAIL: ${{ secrets.BACKTEST_EMAIL }}
        run: |
          PERIOD="${{ matrix.period }}"
          YEAR="${PERIOD%%-*}"
          MONTH="${PERIOD##*-}"
          # NO per-month email: each cell only computes + commits its run dir.
          # The single roll-up email is sent by the `aggregate` job after every
          # cell has landed (see below). This is the "one email, not 11" design.
          ARGS="--knob ${{ matrix.knob }} --year ${YEAR} --month ${MONTH} --pairs ${{ inputs.pairs }} --risk-usd ${{ inputs.risk_usd }}"
          python -m backtest.diagnostics.run_knob_sweep $ARGS

      - name: Commit run directory to main
        # The two-year corpus lives in the repo on purpose (artifacts expire).
        # We commit ONLY this cell's new run dir. `git pull --rebase` before push
        # so parallel cells don't reject each other.
        if: always()
        run: |
          git add backtest/diagnostics/sweeps/ || true
          if git diff --cached --quiet; then
            echo "No sweep output to commit."
            exit 0
          fi
          git commit -m "Knob sweep: ${{ matrix.knob }} ${{ matrix.period }} [skip ci]"
          pushed=0
          for i in 1 2 3 4 5; do
            if git pull --rebase origin main && git push origin HEAD:main; then
              pushed=1; break
            fi
            echo "push retry $i ..."; sleep $((RANDOM % 5 + 2))
          done
          if [ "$pushed" != "1" ]; then
            # LOUD failure: a run that emailed but could not be committed must turn
            # the job red, not vanish. (The artifact below is still the fallback.)
            echo "::error::sweep run committed locally but PUSH TO main FAILED after 5 tries — corpus row not saved. Check branch protection / token perms."
            exit 1
          fi

      - name: Upload run artifacts (belt & braces)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: knob-sweep-${{ matrix.knob }}-${{ matrix.period }}
          path: backtest/diagnostics/sweeps/
          retention-days: 30

  # ONE roll-up email per knob, AFTER every month-cell has committed its run dir.
  # This replaces the 11 per-month emails: the aggregator pools every PASSed
  # month for the knob (cross-month win-fraction, OOS holdout, and the per-asset-
  # class buckets) and sends a single verdict. Runs once per knob (one cell per
  # knob, no month axis) so two knobs => two emails, not 22.
  aggregate:
    needs: [prepare, sweep]
    if: ${{ always() && inputs.send_email == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        knob: ${{ fromJson(needs.prepare.outputs.knobs) }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch the tip of main so every run dir the sweep cells just pushed is
          # present. The sweep job's commits have landed by the time this runs.
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Send one roll-up email for this knob
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          BACKTEST_EMAIL: ${{ secrets.BACKTEST_EMAIL }}
        run: |
          python -m backtest.diagnostics.aggregate_sweeps \
            --knob ${{ matrix.knob }} --email
