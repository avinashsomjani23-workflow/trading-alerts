name: Tests

# Runs automatically on every push and pull request so a regression is caught
# without anyone remembering to run anything by hand. These are the offline
# safety nets — no network, no secrets, no yfinance. Fast (seconds).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        # Single source of truth (requirements.txt). The offline tests import
        # smc_radar, which pulls in the full import chain (charts -> matplotlib),
        # so the test job needs the same deps as the runtime jobs. Installing the
        # shared list guarantees the import chain can never out-grow this job.
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Structure golden-file regression (compute_structure)
        # Wave 2 item 2A. Asserts compute_structure output is byte-identical to
        # the recorded golden for every committed fixture. This is the gate that
        # must stay green before any structure-touching change.
        run: python -m backtest.structure_golden.test_structure_golden

      - name: Scan-log self-test (the gates catch planted failures)
        run: python -m backtest.scanlog.test_scanlog_self

      - name: Slate Zone round-trip (no field can die in a hand-copy)
        # Wave 2 item 2B. Asserts every zone in active_obs.json survives
        # Zone.from_dict -> to_dict byte-identical, so the typed slate field
        # list can never silently drop a field.
        run: python test_zone_roundtrip.py

      - name: Schema version stamp + fail-loud reader
        # Wave 1 item 1C. Proves state files get stamped, a missing version is
        # treated as v1 (deploy-safe), and a MISMATCHED version fails loud
        # instead of silently mis-parsing.
        run: python test_schema_version.py

      - name: Live feed strips synthetic weekend bars
        # Twelve Data pads the FX-closed weekend with ~40 filler bars; the system
        # is built on MT5's gapped shape. Fillers break charts AND the uniform-
        # delta resync (boxes drift off candles). This gate fails if the strip
        # regresses so both bug classes can't return silently.
        run: python tests/test_feed_weekend_strip.py

      - name: Event-candle fix guard (true-break anchor)
        # 2026-07-09 EVENT-CANDLE FIX. Asserts events stamp the TRUE break candle
        # (first close past the displacement buffer), not the confirmation candle,
        # and that break_quality is still graded on the confirmation candle. A
        # revert re-corrupts the OB on ~15% of events (34% of CHoCHs) with no
        # error — this goes red instead. Standalone script (no pytest).
        run: python tests/test_event_candle_fix.py

      - name: Defended-swing polarity guard (false-CHoCH class)
        # 2026-07-16 DEFENDED-POLARITY FIX (commit 7152f7f). Asserts `defended`
        # updates on ANY confirmed counter-trend swing (HH in downtrend, LL in
        # uptrend), so a close between a stale swing and the true one no longer
        # fires a false CHoCH. A revert re-opens the class (17.5% of CHoCHs were
        # false at that candle) with no error — this goes red instead. Standalone
        # script (no test_* functions, so pytest collects 0 — must run directly).
        run: python tests/test_defended_polarity.py

      - name: File-placement net (no misplaced file tracked at repo root)
        # paths.py is the single source of truth for WHERE each kind of file
        # belongs (state/ docs/ tests/ or root). Files the project creates route
        # through it automatically. This net catches a file created BY HAND at the
        # wrong place: it fails if any tracked root file is one paths.py would have
        # put in a folder (a stray .md, a stray test_*.py, a stray state .json).
        # Keeps the repo self-organising with no watcher and no local machinery.
        run: python tests/test_repo_paths.py

      - name: Offline pytest suite (session DST, choch supersession, ...)
        # The pytest-style offline guards were never run in CI (this job listed
        # scripts by name and invoked no pytest). Wires them in so a regression in
        # session DST-awareness or choch supersession can't ship silently.
        # pytest is a test-only tool — installed here, NOT in requirements.txt, so
        # the runtime dependency list stays free of test tooling.
        run: |
          pip install pytest
          python -m pytest tests/ -q
