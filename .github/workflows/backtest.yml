name: Backtest

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "Start date (YYYY-MM-DD)"
        required: true
      end_date:
        description: "End date (YYYY-MM-DD)"
        required: true
      regime:
        description: "Regime tag"
        required: true
        default: "war"
        type: choice
        options: [war, bau, unspecified]
      pairs:
        description: "Comma-separated pairs"
        required: false
        default: "EURUSD,NZDUSD,USDJPY,USDCHF,NAS100,GOLD"
      risk_gbp:
        description: "Risk per trade in USD (1R)"
        required: false
        default: "250"
      send_email:
        description: "Email the report"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write   # needed to push run_log.jsonl + console.log back to main
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy openpyxl pyarrow requests matplotlib google-generativeai

      - name: Run H1-only sanity test (synthetic OB)
        # Fast guardrail: catches regressions in compute_phase2_levels h1_only
        # path or the dual-entry simulator before we spend cycles on a full run.
        run: python -m backtest.test_h1_only

      - name: Run news filter sanity test (metric-exclusion invariant)
        # Proves news-blocked trades never leak into any aggregate metric.
        # Adding extreme-outcome blocked rows must not move P&L, WR, RR, etc.
        run: python -m backtest.test_news_filter

      - name: Run P&L reconciliation tests
        # Pins the contract that headline P&L, head-to-head P&L, Excel
        # Dollar P&L and registry headline all derive from the same column
        # (r_realised). Catches regressions of the May-2026 divergence bug.
        run: python -m backtest.test_pnl_reconciliation

      - name: Run backtest
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BACKTEST_EMAIL: ${{ secrets.BACKTEST_EMAIL }}
        run: |
          ARGS="--start ${{ inputs.start_date }} --end ${{ inputs.end_date }} --regime ${{ inputs.regime }} --mode h1_only --pairs ${{ inputs.pairs }} --risk-usd ${{ inputs.risk_gbp }}"
          if [ "${{ inputs.send_email }}" = "true" ]; then
            ARGS="$ARGS --email"
          fi
          python backtest/run_backtest.py $ARGS

      - name: Upload report artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backtest-h1_only-${{ inputs.regime }}-${{ inputs.start_date }}-${{ inputs.end_date }}
          path: backtest/results/
          retention-days: 30

      - name: Commit run log back to repo
        if: always()
        run: |
          set -e
          # Run-id prefix matches run_backtest._run_h1_only (h1_only mode is forced above).
          RUN_ID="h1only_$(echo ${{ inputs.start_date }} | tr -d -)_$(echo ${{ inputs.end_date }} | tr -d -)"
          LOG_DIR="backtest/results/$RUN_ID"
          if [ ! -f "$LOG_DIR/run_log.jsonl" ] && [ ! -f "$LOG_DIR/console.log" ]; then
            echo "No logs to commit for $RUN_ID"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Isolate the log files from any other dirty workspace state (the
          # backtest run may have touched live state JSONs as a side effect —
          # we do NOT want those carried in this commit).
          mkdir -p /tmp/bt_logs
          cp -f "$LOG_DIR/run_log.jsonl"      /tmp/bt_logs/ 2>/dev/null || true
          cp -f "$LOG_DIR/console.log"        /tmp/bt_logs/ 2>/dev/null || true
          cp -f "$LOG_DIR/summary.json"       /tmp/bt_logs/ 2>/dev/null || true
          cp -f "$LOG_DIR/zone_register.json" /tmp/bt_logs/ 2>/dev/null || true
          # H1-only artifacts (only present for --mode h1_only runs)
          cp -f "$LOG_DIR/trades.csv"         /tmp/bt_logs/ 2>/dev/null || true

          # Reset workspace to clean HEAD so unrelated dirty files don't block
          # the rebase. Logs are safe in /tmp.
          git reset --hard HEAD
          git clean -fd

          # Retry push up to 5 times to handle races with live system commits
          # (live phases 1/2/3 push state JSONs every few minutes).
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            git reset --hard origin/main
            mkdir -p "$LOG_DIR"
            cp -f /tmp/bt_logs/run_log.jsonl      "$LOG_DIR/" 2>/dev/null || true
            cp -f /tmp/bt_logs/console.log        "$LOG_DIR/" 2>/dev/null || true
            cp -f /tmp/bt_logs/summary.json       "$LOG_DIR/" 2>/dev/null || true
            cp -f /tmp/bt_logs/zone_register.json "$LOG_DIR/" 2>/dev/null || true
            cp -f /tmp/bt_logs/trades.csv         "$LOG_DIR/" 2>/dev/null || true
            git add -f "$LOG_DIR/run_log.jsonl" "$LOG_DIR/console.log" "$LOG_DIR/summary.json" "$LOG_DIR/zone_register.json" "$LOG_DIR/trades.csv" 2>/dev/null || true
            if git diff --cached --quiet; then
              echo "Nothing to commit"
              exit 0
            fi
            git commit -m "Backtest logs: $RUN_ID [skip ci]"
            if git push origin HEAD:main; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi
            echo "Push attempt $attempt rejected — refetching and retrying..."
            sleep 3
          done
          echo "ERROR: push failed after 5 attempts"
          exit 1
