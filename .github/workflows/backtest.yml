name: Backtest

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "Start date (YYYY-MM-DD)"
        required: true
      end_date:
        description: "End date (YYYY-MM-DD)"
        required: true
      regime:
        description: "Regime tag"
        required: true
        default: "war"
        type: choice
        options: [war, bau, unspecified]
      pairs:
        description: "Comma-separated pairs"
        required: false
        default: "EURUSD,NZDUSD,USDJPY,USDCHF,NAS100,GOLD"
      risk_gbp:
        description: "Risk per trade in GBP (1R)"
        required: false
        default: "250"
      send_email:
        description: "Email the report"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy openpyxl pyarrow requests matplotlib google-generativeai

      - name: Run backtest
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BACKTEST_EMAIL: ${{ secrets.BACKTEST_EMAIL }}
        run: |
          ARGS="--start ${{ inputs.start_date }} --end ${{ inputs.end_date }} --regime ${{ inputs.regime }} --pairs ${{ inputs.pairs }} --risk-gbp ${{ inputs.risk_gbp }}"
          if [ "${{ inputs.send_email }}" = "true" ]; then
            ARGS="$ARGS --email"
          fi
          python backtest/run_backtest.py $ARGS

      - name: Upload report artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backtest-${{ inputs.regime }}-${{ inputs.start_date }}-${{ inputs.end_date }}
          path: backtest/results/
          retention-days: 30
