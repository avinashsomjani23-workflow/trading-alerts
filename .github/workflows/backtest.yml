name: Backtest

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "Start date (YYYY-MM-DD)"
        required: true
      end_date:
        description: "End date (YYYY-MM-DD)"
        required: true
      regime:
        description: "Regime tag"
        required: true
        default: "war"
        type: choice
        options: [war, bau, unspecified]
      pairs:
        description: "Comma-separated pairs"
        required: false
        default: "EURUSD,NZDUSD,USDJPY,USDCHF,NAS100,GOLD"
      risk_gbp:
        description: "Risk per trade in USD (1R)"
        required: false
        default: "250"
      send_email:
        description: "Email the report"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write   # needed to push run_log.jsonl + console.log back to main
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy openpyxl pyarrow requests matplotlib google-generativeai

      - name: Run backtest
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BACKTEST_EMAIL: ${{ secrets.BACKTEST_EMAIL }}
        run: |
          ARGS="--start ${{ inputs.start_date }} --end ${{ inputs.end_date }} --regime ${{ inputs.regime }} --pairs ${{ inputs.pairs }} --risk-usd ${{ inputs.risk_gbp }}"
          if [ "${{ inputs.send_email }}" = "true" ]; then
            ARGS="$ARGS --email"
          fi
          python backtest/run_backtest.py $ARGS

      - name: Upload report artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backtest-${{ inputs.regime }}-${{ inputs.start_date }}-${{ inputs.end_date }}
          path: backtest/results/
          retention-days: 30

      - name: Commit run log back to repo
        if: always()
        run: |
          set -e
          RUN_ID="${{ inputs.regime }}_$(echo ${{ inputs.start_date }} | tr -d -)_$(echo ${{ inputs.end_date }} | tr -d -)"
          LOG_DIR="backtest/results/$RUN_ID"
          # Only the logs travel back into the repo — Excel/HTML/raw_alerts stay
          # in the artifact (they're big, binary, and would bloat the repo).
          if [ ! -f "$LOG_DIR/run_log.jsonl" ] && [ ! -f "$LOG_DIR/console.log" ]; then
            echo "No logs to commit for $RUN_ID"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Pull latest in case live system pushed P1/P2/P3 state during the run.
          git pull --rebase origin main || true
          git add -f "$LOG_DIR/run_log.jsonl" "$LOG_DIR/console.log" "$LOG_DIR/summary.json" 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Nothing to commit"
            exit 0
          fi
          git commit -m "Backtest logs: $RUN_ID [skip ci]"
          git push origin HEAD:main
