name: Backtest

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "Start date (YYYY-MM-DD)"
        required: true
      end_date:
        description: "End date (YYYY-MM-DD)"
        required: true
      risk_usd:
        description: "Risk per trade in USD (1R)"
        required: false
        default: "250"

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    permissions:
      contents: write   # needed to push run_log.jsonl + console.log back to main
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Configure git identity
        # Required for backtest/commit_logs.py (called by run_backtest.main)
        # to create the "Backtest logs: <run_id>" commit.
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Pre-flight — verify GitHub push will work
        # A backtest runs ~20 min, then pushes its result logs to main at the
        # very end (backtest/commit_logs.py). If that push can't reach GitHub or
        # isn't authorised, the run wastes 20 min and NO email is sent (push is
        # gated before the email by design). This read-only check proves the
        # remote is reachable and writable-in-principle in a few seconds, so a
        # connectivity/permission problem fails the workflow up front instead of
        # after the full run. It is read-only (ls-remote) -- it never pushes.
        run: |
          set -e
          echo "Checking GitHub remote is reachable and authorised..."
          git fetch origin main
          # ls-remote proves auth + reachability without mutating anything.
          git ls-remote origin main
          echo "Pre-flight OK: origin/main reachable. Push at end of run should succeed."

      - name: Run H1-only sanity test (synthetic OB)
        # Fast guardrail: catches regressions in compute_phase2_levels h1_only
        # path or the dual-entry simulator before we spend cycles on a full run.
        run: python -m backtest.test_h1_only

      - name: Run news filter sanity test (metric-exclusion invariant)
        # Proves news-blocked trades never leak into any aggregate metric.
        # Adding extreme-outcome blocked rows must not move P&L, WR, RR, etc.
        run: python -m backtest.test_news_filter

      - name: Run P&L reconciliation tests
        # Pins the contract that headline P&L, head-to-head P&L, Excel
        # Dollar P&L and registry headline all derive from the same column
        # (r_realised). Catches regressions of the May-2026 divergence bug.
        run: python -m backtest.test_pnl_reconciliation

      - name: Run backtest
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BACKTEST_EMAIL: ${{ secrets.BACKTEST_EMAIL }}
          # News is information-only and its calendar URL 404s on old weeks; skip
          # the fetch so it never wastes time on a multi-year run.
          BACKTEST_SKIP_NEWS: "1"
        run: |
          # Regime auto-detected from backtest/WAR_REGIME_WEEKS.json -- no
          # workflow input. The detector reads the date range and tags the
          # run war/bau before any logging or reporting fires.
          # Pairs: no workflow input -- run_backtest.py's own --pairs default
          # (the 10-pair EURUSD/NZDUSD/USDJPY/USDCHF/GOLD/GBPUSD/AUDUSD/USDCAD/
          # EURJPY/BTCUSD set, NAS100 dropped run-level) is always used.
          # Email: always sent -- --email is no longer conditional.
          python backtest/run_backtest.py \
            --start ${{ inputs.start_date }} --end ${{ inputs.end_date }} \
            --risk-usd ${{ inputs.risk_usd }} --email

      - name: Exit-lab (exit-recipe comparison -> Excel)
        # Runs AFTER the backtest completes, on the same frozen MT5 cache: reads
        # the run's trades.csv, replays each exit recipe (baseline / BE-sweep /
        # fixed-TP / partial+runner), and writes exit_lab.xlsx + CSVs into the run
        # dir (picked up by the artifact upload below). A built-in self-check makes
        # this step FAIL loudly if the replay can't reproduce the backtest's own
        # r_realised, so a bad number can never pass silently.
        run: |
          python -m backtest.diagnostics.exit_lab --start ${{ inputs.start_date }} --end ${{ inputs.end_date }}

      - name: Upload report artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backtest-h1_only-${{ inputs.start_date }}-${{ inputs.end_date }}
          path: backtest/results/
          retention-days: 30

      # NOTE: Log persistence is handled by backtest/commit_logs.py inside
      # run_backtest.main(). That path raises and exits non-zero on any
      # failure, so this workflow does NOT need its own commit step.
      # A previous bash equivalent here did `git reset --hard` which
      # destroyed Python's commit before pushing -- removed to end the race.
      #
      # If the run step above exits non-zero, the workflow fails and you
      # see it immediately. If it succeeds, the commit is guaranteed
      # pushed to origin/main (and verified via git log --grep).
